name: Update Beverage News

on:
  schedule:
    - cron: '0 9 * * *'   # 06:00 ART
    - cron: '0 11 * * *'  # 08:00 ART
    - cron: '0 14 * * *'  # 11:00 ART
    - cron: '0 17 * * *'  # 14:00 ART
    - cron: '0 20 * * *'  # 17:00 ART
    - cron: '0 23 * * *'  # 20:00 ART
  workflow_dispatch:       # permite correrlo manualmente desde GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 python-dotenv

      - name: Run pipeline
        run: python main.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html published_urls.json
          git diff --staged --quiet || git commit -m "Auto-update $(TZ='America/Argentina/Buenos_Aires' date '+%Y-%m-%d %H:%M ART')"
          git push
