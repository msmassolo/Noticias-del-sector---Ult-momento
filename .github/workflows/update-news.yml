name: Update Beverage News

on:
  schedule:
    - cron: '0 7 * * *'  # 08:00 ART (UTC-3)
    - cron: '0 12 * * *'  # 12:00 ART (UTC-3)
  workflow_dispatch:       # permite correrlo manualmente desde GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 python-dotenv anthropic

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py --production

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html published_urls.json
          git add weekly_log.json weekly_summary.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update $(TZ='America/Argentina/Buenos_Aires' date '+%Y-%m-%d %H:%M ART')"
            git pull --rebase origin main
            git push
          fi
